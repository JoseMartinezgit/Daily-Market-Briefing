services:
  - type: web
    name: daily-market-briefing
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py --no-browser --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FINNHUB_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: MARKETAUX_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
